name: Deploy Bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Execute remote commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/my_bot/email_notifier_bot
            git fetch origin main
            git reset --hard origin/main
            # Останавливаем и удаляем старые контейнеры, чтобы избежать конфликтов имен
            sudo docker-compose down || true
            sudo docker stop email_notifier_bot || true
            sudo docker rm email_notifier_bot || true
            # Пересобираем и перезапускаем
            sudo docker-compose up --build -d
            # Очистка старых образов для экономии места
            sudo docker image prune -f
